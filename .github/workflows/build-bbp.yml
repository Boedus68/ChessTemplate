# Compila bbpPairings v4.1.0 per glibc 2.27 (Ubuntu 18.04)
# CentOS 7 ha repo EOL problematici; Ubuntu 18.04 ha repo funzionanti.
# Il binario richiede glibc 2.27 - prova su bedo.it.

name: Build bbpPairings for old glibc

on:
  workflow_dispatch:  # Esecuzione manuale

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:18.04
      options: --user root
    steps:
      - name: Install deps and build
        run: |
          apt-get update && apt-get install -y g++ make wget tar
          cd /tmp
          wget -q https://github.com/BieremaBoyzProgramming/bbpPairings/archive/refs/tags/v4.1.0.tar.gz -O bbp.tar.gz
          tar -xzf bbp.tar.gz
          cd bbpPairings-4.1.0
          make
          cp bbpPairings.exe /github/workspace/bbpPairings.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbpPairings-exe
          path: bbpPairings.exe
